<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voyager Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c0e;
      --surface: #151517;
      --border: #252529;
      --border-hover: #3a3a40;
      --text-primary: #e8e6e3;
      --text-secondary: #8b8b8f;
      --text-muted: #5c5c62;
      --accent: #d4d0c8;
      --accent-dim: #8b8870;
      --radius: 10px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 56px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px 14px;
      margin-bottom: 20px;
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-dim);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    h1 {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 300;
    }

    .subtitle span {
      color: var(--text-muted);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    /* Project cards */
    .projects {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .project-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .project-card:hover {
      border-color: var(--border-hover);
      background: #18181b;
      transform: translateY(-1px);
    }

    .project-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .project-name {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .project-url {
      font-size: 12px;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      color: var(--text-muted);
      font-weight: 400;
    }

    .project-arrow {
      color: var(--text-muted);
      font-size: 18px;
      transition: all 0.2s ease;
    }

    .project-card:hover .project-arrow {
      color: var(--text-secondary);
      transform: translateX(2px);
    }

    /* Footer */
    footer {
      margin-top: 56px;
      text-align: center;
    }

    footer p {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 300;
    }

    footer .divider {
      margin-bottom: 20px;
    }

    /* Status indicators */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
    }

    .status-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #5a5;
    }

    /* Responsive */
    @media (max-width: 480px) {
      body { padding: 32px 16px; }
      h1 { font-size: 26px; }
      .project-card { padding: 16px 18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="badge">
        <span class="badge-dot"></span>
        ship's log · active
      </div>
      <h1>Voyager Dashboard</h1>
      <p class="subtitle">Personal projects <span>—</span> Nuno</p>
    </header>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-label">Applications</span>
      <span class="divider-line"></span>
    </div>

    <div class="projects">
      <a href="https://expense-tracker-liart-gamma.vercel.app" target="_blank" rel="noopener" class="project-card">
        <div class="project-info">
          <span class="project-name">Expense Tracker</span>
          <span class="project-url">expense-tracker-liart-gamma.vercel.app</span>
        </div>
        <span class="project-arrow">→</span>
      </a>

      <a href="https://workout-logbook.vercel.app" target="_blank" rel="noopener" class="project-card">
        <div class="project-info">
          <span class="project-name">Workout Logbook</span>
          <span class="project-url">workout-logbook.vercel.app</span>
        </div>
        <span class="project-arrow">→</span>
      </a>

      <a href="https://mtg-cube-tracker.vercel.app" target="_blank" rel="noopener" class="project-card">
        <div class="project-info">
          <span class="project-name">MTG Cube Tracker</span>
          <span class="project-url">mtg-cube-tracker.vercel.app</span>
        </div>
        <span class="project-arrow">→</span>
      </a>

      <a href="https://ha-caracois.vercel.app" target="_blank" rel="noopener" class="project-card">
        <div class="project-info">
          <span class="project-name">Há Caracóis</span>
          <span class="project-url">ha-caracois.vercel.app</span>
        </div>
        <span class="project-arrow">→</span>
      </a>
    </div>

    <footer>
      <div class="divider">
        <span class="divider-line"></span>
      </div>
      <p>Voyager · personal dashboard</p>
    </footer>
  </div>
</body>
</html>
